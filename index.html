<!DOTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="みらいエンジニアスクールは、未経験からエンジニア転職を目指す20代向けのITスクールです。接客業など異業種からの転職実績多数。手に職をつけたい方を徹底サポートします。"> 
    <link rel="icon" href="school_favicon.png" type="png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <title>未経験エンジニア転職｜みらいエンジニアスクール</title>
</head>
<body>
<section class="hero">
  <img src="main.jpg" class="main-image" alt="メイン画像">
    <h1 class="main-title">
        未経験から手に職をつける第一歩。
    </h1>
      <h2 class="sub-title">
        3ヶ月でWebエンジニアを目指す<br>
        プログラミングスクール
      </h2>
    <div class="cta-group">
      <a href="#" class="cta-button">
        無料相談はこちら
      </a>
      <p class="cta-note">
        ※オンライン対応
      </p>
      <p class="cta-note">
        ※無理な勧誘はありません
      </p>
    </div>
</section>
<section class="problem">
  <div class="problem-inner">
    <h2 class="section-title">
      こんなお悩みありませんか？
    </h2>
    <div class="problem-content">
      <ul class="problem-list">
        <li>将来のキャリアに不安がある</li>
        <li>手に職をつけたい</li>
        <li>文系でもプログラミングができるか不安</li>
        <li>不定休でスクールに通えるか心配</li>
      </ul>
        <img src="problem.png" alt="悩む人" class="problem-image">
    </div>      
  </div>
</section>
<section class="solution">
  <div class="solution-inner">
    <h2 class="section-title">
      その悩み、<br>
      みらいエンジニアスクールが解決します
    </h2>
    <ul class="solution-list">
      <li>未経験から学べるカリキュラム</li>
      <li>現役エンジニア講師がサポート</li>
      <li>オンライン対応で不定休でも学習可能</li>
      <li>転職サポートあり</li>
    </ul>

  </div>
</section>


</body>
</html>
